<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Home</title>
<style>
    body {
        margin: 0;
        padding: 0;
        background: #0f0f0f;
        color: rgba(111, 101, 93, 0.9);
        font-family: "Ubuntu", sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
    }

.search-box {
    width: 450px;
    padding: 0;                 
    background: transparent;    
    border: none;               
    box-shadow: none;           
    display: flex;
    justify-content: center;
}

.search-box input {
    width: 100%;
    padding: 14px 18px;
    border-radius: 12px;
    border: 1px solid rgba(111, 101, 93, 0.9);
    background: #1a1a1a;
    color: rgba(111, 101, 93, 0.9);
    font-size: 16px;
    outline: none;
}

    .links {
        margin-top: 35px;
        display: flex;
        gap: 20px;
    }

    .links a {
        color: rgba(111, 101, 93, 0.9);
        text-decoration: none;
        padding: 12px 20px;
        border-radius: 10px;
        background: #1a1a1a;
        border: 1px solid rgba(111, 101, 93, 0.9);
        font-size: 15px;
        transition: 0.2s;
        box-shadow: 0 0 15px rgba(0,0,0,0.3);
    }

    .links a:hover {
        background: #e3a797;
        color: #111;
        border-color: #e3a797;
    }
</style>
</head>
<body>

<div class="search-box">
    <form action="https://www.startpage.com/sp/search" method="GET">
        <input type="text" name="query" placeholder="Search with Startpage…">
    </form>
</div>

<div class="links">
    <a href="https://www.youtube.com">YouTube</a>
    <a href="https://github.com">GitHub</a>
</div>

</body>
</html>
